name: CI/CD Pipeline cho Tro-Go

# Khi nào thì chạy kịch bản này? (Khi có lệnh push lên nhánh main)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # -----------------------------------------------------
  # Step 1: TESTING
  # -----------------------------------------------------
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setting up go modules
        run: go mod download

      - name: Run unit tests
        run: go test -v ./...

  # -----------------------------------------------------
  # Step 2: DEPLOY
  # -----------------------------------------------------
  deploy:
    name: Deploy to VPS
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy qua SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/motel
            git pull origin main
            docker compose -f docker-compose.prod.yml up -d --build
