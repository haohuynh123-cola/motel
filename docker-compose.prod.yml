services:
  db:
    image: postgres:15-alpine
    container_name: tro_go_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-tro_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mot_mat_khau_sieu_kho_123}
      POSTGRES_DB: ${DB_NAME:-tro_go_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tro_admin} -d ${DB_NAME:-tro_go_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tro_go_api_prod
    restart: always
    environment:
      APP_PORT: ${APP_PORT:-8080}
      DATABASE_URL: ${DATABASE_URL:-postgres://tro_admin:mot_mat_khau_sieu_kho_123db:5432/tro_go_prod?sslmode=disable}
      DB_MAX_CONNS: ${DB_MAX_CONNS:-50}
      JWT_SECRET: ${JWT_SECRET:-mot_chuoi_bi_mat_rat_dai_cho_jwt_token}
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: tro_go_nginx_prod
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api

volumes:
  postgres_data_prod:
