version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tro_go_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgrespassword}
      POSTGRES_DB: ${DB_NAME:-tro_go}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tro_go"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: tro_go_api_prod
    restart: always
    ports:
      - "8080:8080"
    environment:
      APP_PORT: 8080
      DATABASE_URL: "postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgrespassword}@db:5432/${DB_NAME:-tro_go}?sslmode=disable"
      DB_MAX_CONNS: 50
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data_prod:
