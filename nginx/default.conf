server {
    listen 80;
    server_name api.codetoolkit.org;

    # Chuyển hướng HTTP sang HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.codetoolkit.org;

    ssl_certificate /etc/ssl/cloudflare/codetoolkit/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/codetoolkit/private.pem;

    # 1. Backend API: Điều hướng các request bắt đầu bằng /api/v1
    location /api/v1 {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. API Docs: Điều hướng trang tài liệu
    location /docs {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Frontend: Mặc định tất cả các path khác sẽ vào Vue App
    location / {
        # Giả sử bạn chạy container frontend ở cùng mạng và đặt tên là 'frontend'
        # Hoặc dùng IP/Port nội bộ nếu chạy riêng
        proxy_pass http://frontend:80;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Hỗ trợ WebSocket (nếu FE có dùng hot-reload hoặc socket)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
