server {
    listen 80;
    server_name motel.codetoolkit.org;

    # Chuyển hướng HTTP sang HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name motel.codetoolkit.org;

    ssl_certificate /etc/ssl/cloudflare/codetoolkit/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/codetoolkit/private.pem;

    # 1. Backend API: Điều hướng các request bắt đầu bằng /api/v1
    location /api/v1 {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. API Docs: Điều hướng trang tài liệu
    location /docs {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Mặc định các đường dẫn khác (Ví dụ vào trang chủ domain sẽ hiện câu chào)
    location / {
        add_header Content-Type text/plain;
        return 200 'Tro-Go API Server is Running';
    }
}
