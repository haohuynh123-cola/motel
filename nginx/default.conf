# --- FRONTEND: motel.codetoolkit.org ---
server {
    listen 80;
    server_name motel.codetoolkit.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name motel.codetoolkit.org;

    ssl_certificate /etc/ssl/cloudflare/codetoolkit/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/codetoolkit/private.pem;

    location / {
        proxy_pass http://frontend:80; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- BACKEND API: api.codetoolkit.org ---
server {
    listen 80;
    server_name api.codetoolkit.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.codetoolkit.org;

    ssl_certificate /etc/ssl/cloudflare/codetoolkit/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/codetoolkit/private.pem;

    location /api/v1 {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        add_header Content-Type text/plain;
        return 200 'Tro-Go API Server is Running';
    }
}
