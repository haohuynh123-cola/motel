# Tự động chuyển hướng toàn bộ HTTP sang HTTPS
server {
    listen 80;
    server_name motel.codetoolkit.org api.codetoolkit.org;
    return 301 https://$host$request_uri;
}

# Cấu hình chung cho cả 2 Subdomain (hoặc bạn có thể tách ra nếu muốn)
server {
    listen 443 ssl;
    server_name motel.codetoolkit.org api.codetoolkit.org;

    ssl_certificate /etc/ssl/cloudflare/codetoolkit/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/codetoolkit/private.pem;

    # Hỗ trợ API
    location /api/v1 {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hỗ trợ Tài liệu API
    location /docs {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Trang chủ mặc định (Không quan tâm đến FE container nữa)
    location / {
        add_header Content-Type text/plain;
        return 200 'Tro-Go API Gateway is Running. Connect via api.codetoolkit.org';
    }
}
